databaseChangeLog:
  - changeSet:
      id: 007
      author: artsobol

      changes:
        - createSequence:
            sequenceName: seq_membership

        - createTable:
            tableName: memberships
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_memberships

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false

              - column:
                  name: starts_at
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: ends_at
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: last_modified_by
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false

        - addDefaultValue:
            tableName: memberships
            columnName: id
            defaultValueSequenceNext: seq_membership

        - addForeignKeyConstraint:
            constraintName: fk_memberships_user
            baseTableName: memberships
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

        - createIndex:
            indexName: idx_memberships_user_id
            tableName: memberships
            columns:
              - column:
                  name: user_id

      rollback:
        - dropIndex:
            indexName: idx_memberships_user_id
            tableName: memberships

        - dropForeignKeyConstraint:
            baseTableName: memberships
            constraintName: fk_memberships_user

        - dropTable:
            tableName: memberships

        - dropSequence:
            sequenceName: seq_membership
