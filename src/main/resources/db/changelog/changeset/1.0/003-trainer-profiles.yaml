databaseChangeLog:
  - changeSet:
      id: 003
      author: artsobol

      changes:
        - createTable:
            tableName: trainer_profiles
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                      primaryKey: true
                      primaryKeyName: pk_trainer_profiles
                      nullable: false

              - column:
                  name: specialization_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: version
                  type: bigint
                  defaultValueComputed: "0"
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: trainer_profiles
            baseColumnNames: specialization_id
            constraintName: fk_trainer_profile_specialization_id
            referencedColumnNames: id
            referencedTableName: trainer_specializations

        - addForeignKeyConstraint:
            baseTableName: trainer_profiles
            baseColumnNames: user_id
            constraintName: fk_trainer_profile_user_id
            referencedColumnNames: id
            referencedTableName: users

      rollback:
        - dropForeignKeyConstraint:
            baseTableName: trainer_profiles
            constraintName: fk_trainer_profile_specialization_id
        - dropForeignKeyConstraint:
            baseTableName: trainer_profiles
            constraintName: fk_trainer_profile_user_id
        - dropTable:
            tableName: trainer_profiles