databaseChangeLog:
  - changeSet:
      id: 006
      author: artsobol

      changes:
        - createSequence:
            sequenceName: seq_bookings

        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bookings

              - column:
                  name: workout_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: last_modified_by
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false

        - addDefaultValue:
            tableName: bookings
            columnName: id
            defaultValueSequenceNext: seq_bookings

        - addForeignKeyConstraint:
            constraintName: fk_bookings_workout_id
            baseTableName: bookings
            baseColumnNames: workout_id
            referencedTableName: workouts
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_bookings_user_id
            baseTableName: bookings
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

        - addUniqueConstraint:
            constraintName: uq_bookings_user_id_workout_id
            tableName: bookings
            columnNames: user_id, workout_id

        - createIndex:
            indexName: idx_bookings_workout_id
            tableName: bookings
            columns:
              - column:
                  name: workout_id

        - createIndex:
            indexName: idx_bookings_user_id
            tableName: bookings
            columns:
              - column:
                  name: user_id

      rollback:
        - dropIndex:
            indexName: idx_bookings_user_id
            tableName: bookings

        - dropIndex:
            indexName: idx_bookings_workout_id
            tableName: bookings

        - dropUniqueConstraint:
            constraintName: uq_bookings_user_id_workout_id
            tableName: bookings

        - dropForeignKeyConstraint:
            baseTableName: bookings
            constraintName: fk_bookings_user_id

        - dropForeignKeyConstraint:
            baseTableName: bookings
            constraintName: fk_bookings_workout_id

        - dropTable:
            tableName: bookings

        - dropSequence:
            sequenceName: seq_bookings
