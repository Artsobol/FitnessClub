databaseChangeLog:
  - changeSet:
      id: 002
      author: artsobol

      changes:
        - createSequence:
            sequenceName: seq_trainer_specialization

        - createTable:
            tableName: trainer_specializations
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_trainer_specializations

              - column:
                  name: title
                  type: varchar(32)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_trainer_specializations_title

              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - addDefaultValue:
            tableName: trainer_specializations
            columnName: id
            defaultValueSequenceNext: seq_trainer_specialization

        - createIndex:
            indexName: idx_trainer_specializations_title
            tableName: trainer_specializations
            columns:
              - column:
                  name: title

      rollback:
        - dropSequence:
            sequenceName: seq_trainer_specialization
        - dropIndex:
            indexName: idx_trainer_specializations_title
            tableName: trainer_specializations
        - dropTable:
            tableName: trainer_specializations