databaseChangeLog:
  - changeSet:
      id: 005
      author: artsobol

      changes:
        - createSequence:
            sequenceName: seq_workouts

        - createTable:
            tableName: workouts
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_workouts

              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: varchar(1024)

              - column:
                  name: trainer_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: starts_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: ends_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: capacity
                  type: int

              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: last_modified_by
                  type: uuid

              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false

        - addDefaultValue:
            tableName: workouts
            columnName: id
            defaultValueSequenceNext: seq_workouts

        - addForeignKeyConstraint:
            constraintName: fk_workouts_trainer_id
            baseTableName: workouts
            baseColumnNames: trainer_id
            referencedTableName: trainer_profiles
            referencedColumnNames: user_id

        - createIndex:
            indexName: idx_workouts_trainer_id
            tableName: workouts
            columns:
              - column:
                  name: trainer_id

      rollback:
        - dropIndex:
            indexName: idx_workouts_trainer_id
            tableName: workouts

        - dropForeignKeyConstraint:
            baseTableName: workouts
            constraintName: fk_workouts_trainer_id

        - dropTable:
            tableName: workouts

        - dropSequence:
            sequenceName: seq_workouts
