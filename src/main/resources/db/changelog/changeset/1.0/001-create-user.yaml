databaseChangeLog:
  - changeSet:
      id: 001
      author: artsobol

      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users

              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_users_email

              - column:
                  name: role
                  type: varchar(16)
                  constraints:
                    nullable: false

              - column:
                  name: first_name
                  type: varchar(32)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: varchar(32)
                  constraints:
                    nullable: false

              - column:
                  name: birthdate
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: version
                  type: bigint
                  defaultValueComputed: "0"
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            tableName: users
