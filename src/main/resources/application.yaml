spring:
  application:
    name: FitnessClub

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 15m
    config:
      b-crypt-strength: 12
      password-encoder: argon2